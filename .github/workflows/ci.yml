name: CI
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # weekly freshness run

jobs:
  installer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Shell syntax
        run: bash -n install.sh uninstall.sh templates/verify-nextjs.sh shell/amiral-profiles.sh bin/amiral-doctor bin/amiral-trust bin/amiral-setup bin/amiral-savings bin/amiral-report bin/amiral-butin bin/amiral-journal bin/amiral-statusline lib/butin/cache.sh adapters/claude-code/butin-collect.sh adapters/claude-code/butin-receipt.sh hooks/subagent-verify.sh

      - name: Plugin manifests are valid JSON
        run: |
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"

      - name: Portable layer present
        run: |
          test -f PATTERN.md
          test -f ports/AGENTS.md
          grep -q "matelot discipline" ports/AGENTS.md

      - name: Dogfood mirror in sync with canonical
        run: |
          diff -r agents .claude/agents
          diff -r skills .claude/skills

      - name: Fresh install
        run: |
          export HOME=$(mktemp -d)
          bash install.sh
          test -f "$HOME/.claude/amiral-policy.md"
          test -f "$HOME/.claude/agents/implementer.md"
          test -f "$HOME/.claude/agents/grunt.md"
          test -f "$HOME/.claude/agents/reviewer.md"
          test -f "$HOME/.claude/agents/corsaire.md"
          test -f "$HOME/.claude/agents/advisor.md"
          test -f "$HOME/.claude/skills/plan-ship/SKILL.md"
          test -f "$HOME/.claude/amiral-profiles.sh"
          test -f "$HOME/.claude/amiral-profiles.ps1"
          grep -q '@amiral-policy.md' "$HOME/.claude/CLAUDE.md"

      - name: Idempotence (double install, no duplicate import)
        run: |
          export HOME=$(mktemp -d)
          bash install.sh && bash install.sh
          [ "$(grep -c 'amiral-policy.md' "$HOME/.claude/CLAUDE.md")" = "1" ]

      - name: Preserves existing CLAUDE.md
        run: |
          export HOME=$(mktemp -d)
          mkdir -p "$HOME/.claude"
          echo "# my precious existing memory" > "$HOME/.claude/CLAUDE.md"
          bash install.sh
          grep -q "my precious existing memory" "$HOME/.claude/CLAUDE.md"
          grep -q '@amiral-policy.md' "$HOME/.claude/CLAUDE.md"

      - name: Clean uninstall
        run: |
          export HOME=$(mktemp -d)
          bash install.sh && bash uninstall.sh
          ! grep -q 'amiral-policy' "$HOME/.claude/CLAUDE.md"
          [ ! -f "$HOME/.claude/agents/implementer.md" ]
          [ ! -d "$HOME/.claude/skills/plan-ship" ]

      - name: Doctor runs after install
        run: |
          export HOME=$(mktemp -d)
          bash install.sh
          bash "$HOME/.claude/amiral-doctor" || true   # 'claude' absent in CI: doctor must run, not crash
          bash "$HOME/.claude/amiral-doctor" | grep -q "Summary:"

      - name: Profiles load in a shell
        run: bash -c 'source shell/amiral-profiles.sh && type amiral amiral-solo amiral-advisor amiral-fine amiral-ultra matelot amiral-doctor > /dev/null && echo functions defined'

      - name: Hook refuses untrusted verify.sh
        run: |
          export HOME=$(mktemp -d); export CLAUDE_CONFIG_DIR="$HOME/.claude"; mkdir -p "$CLAUDE_CONFIG_DIR"
          d=$(mktemp -d); cd "$d"; git init -q .
          printf '#!/bin/bash\ntouch PWNED\nexit 0\n' > verify.sh; chmod +x verify.sh
          bash "$GITHUB_WORKSPACE/hooks/subagent-verify.sh" || true
          [ ! -f PWNED ] && echo "untrusted verify.sh was NOT executed (correct)"
          bash "$GITHUB_WORKSPACE/bin/amiral-trust"
          bash "$GITHUB_WORKSPACE/hooks/subagent-verify.sh" || true
          [ -f PWNED ] && echo "trusted verify.sh executed (correct)"

      - name: First-run setup writes prefs
        run: |
          export HOME=$(mktemp -d); export CLAUDE_CONFIG_DIR="$HOME/.claude"; mkdir -p "$CLAUDE_CONFIG_DIR"
          printf '2\n' | bash bin/amiral-setup < /dev/stdin || true
          # non-interactive fallback: simulate choice 2 (Max/Opus)
          test -f "$CLAUDE_CONFIG_DIR/amiral.env" && grep -q 'AMIRAL_BRAIN=' "$CLAUDE_CONFIG_DIR/amiral.env" && echo "prefs written"

      - name: Savings calculator runs
        run: |
          out=$(bash bin/amiral-savings --tokens 1 --brain fable --hands sonnet --plan 20)
          echo "$out" | grep -q "You save" && echo "savings calc works"

      - name: Report wizard runs and sends nothing
        run: |
          out=$(printf 'test task\n2.1.x\n100k\n40k\n80k\nyes\nnote\n' | bash bin/amiral-report)
          echo "$out" | grep -q "Nothing has been sent" && echo "$out" | grep -q "issues/new" && echo "report wizard OK"

      - name: Butin critical-path battery
        run: bash tests/test-butin.sh

      - name: Statusline battery
        run: bash tests/test-statusline.sh

      - name: Journal battery
        run: bash tests/test-journal.sh

      - name: No dangerous flags shipped
        run: |
          ! grep -R -- "--dangerously-skip-permissions" shell/ install.sh agents/ skills/

      - name: No dead provenance trailers in user-facing docs
        # v0.14.0 removed Amiral-Verified (forgeable) and renamed
        # Amiral-Attest -> Amiral-Diff-Digest. The README advertising a
        # trailer the code no longer emits is itself a false provenance
        # claim (corsaire, v0.14.0) — fail CI if docs re-diverge.
        # READMEs only: docs/butin-spec-v2.md legitimately states the
        # NEGATIVE ("there is no Amiral-Verified trailer") — that honest
        # mention must not trip the guard.
        run: |
          ! grep -n "Amiral-Verified\|Amiral-Attest" README.md README.fr.md

  # BSD userland coverage: every stat -c || stat -f and date -d || date -j
  # chain only exercises its GNU branch on ubuntu. macOS runs the BSD side
  # (and Apple's bash 3.2), where past audits found real breaks.
  batteries-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Butin critical-path battery (BSD userland)
        run: bash tests/test-butin.sh
      - name: Statusline battery (BSD userland)
        run: bash tests/test-statusline.sh
      - name: Journal battery (BSD userland)
        run: bash tests/test-journal.sh
