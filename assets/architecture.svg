  <line x1="380" y1="106" x2="380" y2="180" stroke="#8b8b8b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="460" y1="106" x2="630" y2="180" stroke="#8b8b8b" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Workers -->
  <rect x="20" y="188" width="220" height="100" rx="10" fill="#0f2a1e" stroke="#2ecc71" stroke-width="1.5"/>
  <text x="130" y="215" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">implementer</text>
  <text x="130" y="236" text-anchor="middle" fill="#a8e6c8" font-size="12">model: sonnet</text>
