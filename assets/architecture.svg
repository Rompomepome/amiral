  <text x="130" y="274" text-anchor="middle" fill="#c9c9d9" font-size="11">full write access</text>
  <rect x="270" y="188" width="220" height="100" rx="10" fill="#2a230f" stroke="#f1c40f" stroke-width="1.5"/>
  <text x="380" y="215" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">grunt</text>
  <text x="380" y="236" text-anchor="middle" fill="#f5e6a8" font-size="12">model: haiku · effort: low</text>
