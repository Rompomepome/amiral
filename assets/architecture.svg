  <text x="630" y="215" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">reviewer</text>
  <text x="630" y="236" text-anchor="middle" fill="#a8cbe6" font-size="12">model: sonnet · read-only</text>
  <text x="630" y="256" text-anchor="middle" fill="#c9c9d9" font-size="11">fresh-context review</text>
  <text x="630" y="274" text-anchor="middle" fill="#c9c9d9" font-size="11">prioritized report</text>
  <text x="380" y="322" text-anchor="middle" fill="#8b8b8b" font-size="12">heavy execution tokens billed at worker price — CLAUDE_CODE_SUBAGENT_MODEL caps the ceiling</text>
